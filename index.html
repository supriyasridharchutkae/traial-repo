<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautiful Clouds</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #87ceeb 0%, #b3d9ff 40%, #f2f9ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #2d3a50;
    }
    .scene {
      width: 90%;
      max-width: 800px;
      text-align: center;
    }
    .cloud {
      position: relative;
      display: inline-block;
      width: 180px;
      height: 100px;
      background: #fff;
      border-radius: 60px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      margin: 20px;
    }
    .cloud:before,
    .cloud:after {
      content: "";
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }
    .cloud:before {
      width: 120px;
      height: 120px;
      top: -40px;
      left: 15px;
    }
    .cloud:after {
      width: 90px;
      height: 90px;
      top: -20px;
      right: 15px;
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 3rem;
    }
    p {
      font-size: 1.1rem;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="scene">
    <h1>Beautiful Clouds</h1>
    <p>Soft white clouds drifting across a calm blue sky.</p>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>
</body>
</html>
